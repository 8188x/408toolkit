{% extends "base.html" %}{% block title %}复习资料{% endblock %}
{% block content %}
<style>
.mc{margin-bottom:10px;padding:12px;background:rgba(11,14,23,.3);border-radius:8px;border-left:3px solid;transition:all .2s}
.mc:hover{background:rgba(11,14,23,.5)}
.mc .mt{font-size:.8rem;font-weight:600;color:#dce0f0;margin-bottom:4px}
.mc .mc2{font-size:.78rem;color:rgba(255,255,255,.55);line-height:1.7}
</style>
<h2 style="font-size:1rem;margin-bottom:14px;color:#dce0f0">408 复习资料</h2>
{% for sk,sv in subjects.items() %}
<div class="cd anim"><div class="ct" style="color:{{ sv.color }}">{{ sv.name }}</div>
{% for m in materials[sk] %}
<div class="mc" style="border-color:{{ sv.color }}">
  <div class="mt">{{ m.t }}</div>
  <div class="mc2">{{ m.c }}</div>
</div>{% endfor %}</div>
{% endfor %}
{% endblock %}
