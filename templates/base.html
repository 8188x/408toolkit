<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}408Toolkit{% endblock %}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5; color: #1a1a2e; line-height: 1.6;
}
.hd {
  background: linear-gradient(135deg, #1a2744, #2c3e7a); color: #fff;
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
}
.hi { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.lg { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
.lg em { font-style: normal; color: #ffd700; }
.nv { display: flex; gap: 4px; }
.nv a {
  padding: 6px 16px; border-radius: 6px; text-decoration: none; color: rgba(255,255,255,.7);
  font-size: .82rem; font-weight: 500; transition: all .15s;
}
.nv a:hover { background: rgba(255,255,255,.1); color: #fff; }
.nv a.act { background: rgba(255,255,255,.15); color: #fff; font-weight: 600; }
.mn { max-width: 1100px; margin: 0 auto; padding: 24px; min-height: calc(100vh - 120px); }
.ft { text-align: center; padding: 20px; font-size: .75rem; color: #8896b8; border-top: 1px solid #e2e5ee; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="hd"><div class="hi">
  <div class="lg"><em>408</em>Toolkit</div>
  <div class="nv">
    <a href="/" class="{% if request.path == '/' %}act{% endif %}">首页</a>
    <a href="/questions" class="{% if request.path in ['/questions','/quiz'] %}act{% endif %}">题库</a>
    <a href="/quiz" class="{% if request.path == '/quiz' %}act{% endif %}">刷题</a>
    <a href="/codes" class="{% if request.path == '/codes' %}act{% endif %}">代码</a>
    <a href="/about" class="{% if request.path == '/about' %}act{% endif %}">关于</a>
  </div>
</div></div>
<main class="mn">{% block content %}{% endblock %}</main>
<div class="ft">408Toolkit · 085404 计算机技术 · Python/Flask</div>
</body>
</html>
