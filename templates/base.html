<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}408Kit{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#0b0e17;color:#dce0f0;line-height:1.6;overflow-x:hidden
}
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.hd,.mn,.ft{position:relative;z-index:1}
.hd{
  background:rgba(11,14,23,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,210,235,.15);padding:0 20px;
  position:sticky;top:0;z-index:100
}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px}
.lg{font-size:1.1rem;font-weight:800;text-decoration:none;color:#fff;letter-spacing:-.5px}
.lg em{font-style:normal;color:#4a7cfa;text-shadow:0 0 20px rgba(200,210,235,.3)}
.nv{display:flex;gap:2px;align-items:center}
.nv a,.nv button{
  padding:5px 14px;border-radius:6px;text-decoration:none;color:rgba(255,255,255,.6);
  font-size:.76rem;font-weight:500;transition:all .2s;border:none;background:transparent;cursor:pointer;
  position:relative
}
.nv a::after,.nv button::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:#5a7abe;transition:width .2s;border-radius:1px
}
.nv a:hover::after,.nv button:hover::after{width:60%}
.nv a:hover,.nv button:hover{color:#fff}
.nv a.act{color:#fff;font-weight:600}
.nv a.act::after{width:60%;box-shadow:0 0 8px rgba(200,210,235,.4)}
.mn{max-width:1100px;margin:0 auto;padding:30px 40px 40px;min-height:calc(100vh-80px)}
.ft{text-align:center;padding:18px;font-size:.7rem;color:rgba(255,255,255,.25);border-top:1px solid rgba(200,210,235,.08)}
.cd{
  background:rgba(17,22,43,.8);backdrop-filter:blur(10px);
  border:1px solid rgba(200,210,235,.12);border-radius:12px;
  padding:18px;margin-bottom:14px;transition:all .3s cubic-bezier(.4,0,.2,1);overflow:hidden
}
.cd::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(200,210,235,.05),transparent);
  transition:left .6s;pointer-events:none
}
.cd:hover::before{left:100%}
.cd:hover{border-color:rgba(200,210,235,.25);transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,210,235,.1)}
.ct{font-size:.85rem;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(200,210,235,.1);display:flex;justify-content:space-between;color:#dce0f0}
.ct .i2{font-size:.7rem;color:rgba(255,255,255,.35);font-weight:400}
.fb{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px 14px;background:rgba(17,22,43,.6);border-radius:10px;border:1px solid rgba(200,210,235,.08);backdrop-filter:blur(10px)}
.fb select,.fb input{padding:5px 10px;background:rgba(11,14,23,.6);border:1px solid rgba(200,210,235,.15);border-radius:6px;color:#dce0f0;font-size:.78rem;transition:border-color .2s}
.fb select:focus,.fb input:focus{outline:none;border-color:#4a7cfa;box-shadow:0 0 12px rgba(200,210,235,.15)}
.btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.75rem;font-weight:500;transition:all .2s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.1);border-radius:50%;transform:translate(-50%,-50%);transition:all .4s}
.btn:active::after{width:200px;height:200px}
.btn-p{background:#5a7abe;color:#fff;box-shadow:0 4px 15px rgba(200,210,235,.2)}
.btn-p:hover{background:#5a8aff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,210,235,.3)}
.btn-g{background:rgba(200,210,235,.1);color:rgba(255,255,255,.7);border:1px solid rgba(200,210,235,.15)}
.btn-g:hover{background:rgba(200,210,235,.2);color:#fff}
.tg{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.65rem;color:#fff;margin:2px}
.tg{background:#5a7abe}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease forwards}
.anim-d1{animation-delay:.1s}.anim-d2{animation-delay:.2s}.anim-d3{animation-delay:.3s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.g2{grid-template-columns:1fr}}
</style>
{% block head %}{% endblock %}</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="hd"><div class="hi">
<a href="/" class="lg"><em>408</em>Kit</a>
<div class="nv">
<a href="/" class="{% if request.path=='/' %}act{% endif %}">首页</a>
<a href="/questions" class="{% if '/questions' in request.path %}act{% endif %}">题库</a>
<a href="/quiz" class="{% if '/quiz' in request.path %}act{% endif %}">刷题</a>
<a href="/code" class="{% if '/code' in request.path %}act{% endif %}">代码</a>
<a href="/materials" class="{% if '/materials' in request.path %}act{% endif %}">资料</a>
<a href="/summary" class="{% if '/summary' in request.path %}act{% endif %}">速查</a>
<a href="/wrong" class="{% if '/wrong' in request.path %}act{% endif %}">错题</a>
{% if current_user %}
<span style="font-size:.72rem;color:rgba(255,255,255,.35)">{{ current_user.username }}</span>
<a href="/logout">退出</a>
{% else %}<a href="/login">登录</a>{% endif %}
</div></div></div>
<main class="mn">{% block content %}{% endblock %}</main>
<div class="ft">408Toolkit · 考研学习平台 · 开源 · 085404</div>
<script>
(function(){
  var c = document.getElementById('particle-canvas');
  if(!c) return;
  var ctx = c.getContext('2d');
  var pts = [], W, H, mouse = {x:null, y:null}, fid = null;
  function rs(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  window.addEventListener('resize', rs);
  var n = Math.min(35, Math.floor((W||1200)*(H||800)/25000));
  for(var i=0; i<n; i++) pts.push({x:Math.random()*(W||1200), y:Math.random()*(H||800), vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, r:Math.random()*1.5+0.8});
  addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY});
  addEventListener('mouseleave',function(){mouse.x=null;mouse.y=null});
  function dr(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      if(mouse.x!==null){var dx=mouse.x-p.x,dy=mouse.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){p.vx-=dx/d*0.02;p.vy-=dy/d*0.02}}
      p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;p.vy*=0.98;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(200,210,235,0.35)';ctx.fill();
      for(var j=i+1;j<pts.length;j++){var p2=pts[j],dx=p.x-p2.x,dy=p.y-p2.y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.strokeStyle='rgba(200,210,235,'+(0.035*(1-d/100))+')';ctx.stroke()}}
    }
    fid=requestAnimationFrame(dr);
  }
  rs();dr();
  addEventListener('visibilitychange',function(){if(document.hidden&&fid){cancelAnimationFrame(fid);fid=null}else if(!document.hidden&&!fid)dr()});
})();
</script>
</body></html>
