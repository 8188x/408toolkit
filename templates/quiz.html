{% extends "base.html" %}
{% block title %}刷题模式{% endblock %}
{% block content %}
<style>
.qz-card {
  background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06); max-width: 700px; margin: 0 auto 14px;
}
.qz-card .topic { font-size: .72rem; color: #2c3e7a; background: #e8f0fe; display: inline-block; padding: 2px 10px; border-radius: 10px; }
.qz-card h3 { font-size: .95rem; font-weight: 600; margin: 10px 0; }
.qz-card .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.qz-card .opt {
  padding: 10px 14px; background: #f5f6fa; border-radius: 8px; font-size: .85rem;
  cursor: pointer; transition: all .15s; border: 2px solid transparent;
}
.qz-card .opt:hover { background: #eef0f5; }
.qz-card .opt.correct { background: #e6f4f0; border-color: #4ad4a0; }
.qz-card .opt.wrong { background: #fde8e8; border-color: #e05050; }
.qz-card .opt.disabled { pointer-events: none; }
.qz-card .result { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: .85rem; font-weight: 600; text-align: center; }
.qz-card .result.ok { background: #e6f4f0; color: #1a6a5e; }
.qz-card .result.no { background: #fde8e8; color: #a04040; }
.score-bar { text-align: center; margin-bottom: 20px; font-size: .9rem; }
.score-bar b { color: #2c3e7a; }
</style>

<div class="score-bar">得分: <b id="score">0</b> / {{ questions|length }}</div>

{% for q in questions %}
<div class="qz-card" data-ans="{{ q.ans }}" data-qid="{{ q.id }}">
  <span class="topic">{{ topics[q.topic] }}</span>
  <h3>{{ loop.index }}. {{ q.title }}</h3>
  <div class="opts">
    {% for label,text in q.opts %}
    <div class="opt" data-label="{{ label }}" onclick="check(this, '{{ q.ans }}', {{ q.id }})">
      <b>{{ label }}</b>. {{ text }}
    </div>
    {% endfor %}
  </div>
  <div class="result" style="display:none"></div>
</div>
{% endfor %}

<script>
var score = 0;
var answered = {};

function check(el, ans, idx) {
  if (answered[idx]) return;
  var card = el.closest('.qz-card');
  var opts = card.querySelectorAll('.opt');
  var result = card.querySelector('.result');
  var label = el.getAttribute('data-label');
  var correct = label === ans;

  opts.forEach(function(o) { o.classList.add('disabled'); });
  el.classList.add(correct ? 'correct' : 'wrong');
  opts.forEach(function(o) {
    if (o.getAttribute('data-label') === ans) o.classList.add('correct');
  });

  if (correct) { score++; document.getElementById('score').textContent = score; }
  result.style.display = 'block';
  result.className = 'result ' + (correct ? 'ok' : 'no');
  result.textContent = correct ? '✅ 回答正确！' : '❌ 回答错误，正确答案是 ' + ans;
  answered[idx] = true;
}
</script>
{% endblock %}
